name: NHK EPG

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate XMLTV
        run: |
          python scripts/nhk.py

      - name: Show output
        run: |
          ls -lh dist
          python - <<'PY'
          import gzip
          import xml.etree.ElementTree as ET

          gz_path = "nhk_epg.xml.gz"
          with gzip.open(gz_path, "rb") as handle:
              root = ET.fromstring(handle.read())
              channels = root.findall("channel")
              programmes = root.findall("programme")
              print(f"channels={len(channels)}  programmes={len(programmes)}")

              if not channels:
                raise SystemExit("No channels generated")
              if not programmes:
                raise SystemExit("No programmes generated")
          PY

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="nhk-latest"
          TITLE="NHK EPG Latest"
          NOTES="Generated XMLTV EPG for NHK from yesterday through the next 8 days."

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES"
          else
            gh release create "$TAG" --title "$TITLE" --notes "$NOTES"
          fi

          gh release upload "$TAG" \
            nhk_epg.xml.gz \
            --clobber
